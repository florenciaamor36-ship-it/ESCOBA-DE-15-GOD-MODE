<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zapía Nexus V51</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .status-green { background-color: #10b981; box-shadow: 0 0 15px #10b981; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <header style="height: 70px; background: #111; border-bottom: 1px solid #333; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; flex-shrink: 0;">
        <div>
            <h1 style="color: #3b82f6; font-weight: 900; text-transform: uppercase; letter-spacing: -1px; margin: 0;">Zapia Nexus <span style="font-size: 10px; background: #3b82f6; color: #fff; padding: 2px 6px; border-radius: 10px; margin-left: 5px;">V51</span></h1>
            <div style="display: flex; align-items: center; gap: 5px; margin-top: 2px;">
                <div id="db-dot" style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%;" class="pulse"></div>
                <span id="db-status" style="font-size: 9px; color: #888; font-weight: bold; text-transform: uppercase;">Desconectado</span>
            </div>
        </div>
        <i class="fas fa-satellite" style="color: #3b82f6;"></i>
    </header>
    <main id="log-feed" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column-reverse; gap: 10px; background: radial-gradient(circle at top, #020617, #000);">
        <div style="text-align: center; color: #444; padding: 40px; font-weight: bold; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">Sincronizando bus de datos...</div>
    </main>
    <footer style="padding: 15px; background: #111; border-top: 1px solid #333; flex-shrink: 0; padding-bottom: calc(15px + env(safe-area-inset-bottom));">
        <div style="display: flex; gap: 10px; background: #000; border: 1px solid #444; padding: 5px; border-radius: 15px;">
            <input type="text" id="cmd-input" style="flex: 1; background: transparent; border: none; color: #fff; padding: 10px; outline: none; font-size: 14px;" placeholder="Enviar orden a Zapia-Alpha...">
            <button onclick="enviar()" style="background: #3b82f6; color: #fff; border: none; padding: 0 20px; border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 12px; cursor: pointer;">Ejecutar</button>
        </div>
    </footer>
    <script>
        const SB_URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const SB_PUB = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const SB_SEC = atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERnX3lSemlOZ19hYlQ3VTFwZg==');
        const sbAdmin = supabase.createClient(SB_URL, SB_SEC);
        const sbPub = supabase.createClient(SB_URL, SB_PUB);
        const feed = document.getElementById('log-feed');
        function addLog(data) {
            const div = document.createElement('div');
            div.style.background = 'rgba(30, 41, 59, 0.5)';
            div.style.border = '1px solid rgba(255,255,255,0.05)';
            div.style.padding = '15px';
            div.style.borderRadius = '20px';
            div.style.marginBottom = '5px';
            const isZapia = data.emisor === 'ZAPIA';
            const color = isZapia ? '#3b82f6' : '#10b981';
            div.innerHTML = `<div style="display: flex; justify-content: space-between; margin-bottom: 5px;"><span style="color: ${color}; font-weight: 900; font-size: 10px; text-transform: uppercase;">${data.emisor}</span><span style="color: #444; font-size: 8px;">${new Date(data.created_at).toLocaleTimeString()}</span></div><div style="color: #eee; font-size: 13px; line-height: 1.4;">${data.mensaje}</div>`;
            feed.prepend(div);
        }
        async function init() {
            const { data, error } = await sbPub.from('nexus_bus').select('*').order('created_at', { ascending: false }).limit(10);
            if (!error) {
                feed.innerHTML = '';
                data.forEach(addLog);
                document.getElementById('db-dot').style.background = '#10b981';
                document.getElementById('db-status').innerText = 'Online';
            }
            sbPub.channel('nexus_bus').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'nexus_bus' }, payload => {
                addLog(payload.new);
            }).subscribe();
        }
        async function enviar() {
            const input = document.getElementById('cmd-input');
            const msg = input.value.trim();
            if (!msg) return;
            const btn = event.target;
            btn.disabled = true;
            btn.style.opacity = '0.5';
            const { error } = await sbAdmin.from('nexus_bus').insert([{ emisor: 'MAESTRA', receptor: 'Zapia-Alpha', mensaje: msg, status: 'pending' }]);
            if (!error) { input.value = ''; } else { alert("Error: " + error.message); }
            btn.disabled = false;
            btn.style.opacity = '1';
        }
        init();
    </script>
</body>
</html>
