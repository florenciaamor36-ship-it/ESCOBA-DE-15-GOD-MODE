<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUS V53</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; height: 100vh; display: flex; flex-direction: column; margin: 0; }
        #feed { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column-reverse; }
        .msg-box { background: #111; border: 1px solid #333; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .footer-bar { padding: 15px; background: #000; border-top: 1px solid #333; }
    </style>
</head>
<body>
    <div class="p-3 bg-dark border-bottom border-secondary d-flex justify-content-between align-items-center">
        <span class="fw-bold text-primary">NEXUS V53</span>
        <span id="status" class="badge bg-danger">OFFLINE</span>
    </div>

    <div id="feed">
        <div class="text-center text-secondary py-5">Sincronizando...</div>
    </div>

    <div class="footer-bar">
        <div class="input-group">
            <input type="text" id="cmd" class="form-control bg-dark text-white border-secondary" placeholder="Escribí aquí...">
            <button class="btn btn-primary fw-bold" onclick="send()">EJECUTAR</button>
        </div>
    </div>

    <script>
        const SB_URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const SB_PUB = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const SB_SEC = atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERnX3lSemlOZ19hYlQ3VTFwZg==');
        const sb = supabase.createClient(SB_URL, SB_PUB);
        const sbA = supabase.createClient(SB_URL, SB_SEC);

        function render(data) {
            const div = document.createElement('div');
            div.className = 'msg-box';
            div.innerHTML = `<small class="text-primary fw-bold">${data.emisor}</small><p class="m-0">${data.mensaje}</p>`;
            document.getElementById('feed').prepend(div);
        }

        async function init() {
            const { data, error } = await sb.from('nexus_bus').select('*').order('created_at', { ascending: false }).limit(20);
            if (!error) {
                document.getElementById('feed').innerHTML = '';
                data.forEach(render);
                document.getElementById('status').className = 'badge bg-success';
                document.getElementById('status').innerText = 'ONLINE';
            }
            sb.channel('nexus_bus').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'nexus_bus' }, p => render(p.new)).subscribe();
        }

        async function send() {
            const i = document.getElementById('cmd');
            const v = i.value.trim();
            if(!v) return;
            const btn = event.target;
            btn.disabled = true;
            const { error } = await sbA.from('nexus_bus').insert([{ emisor: 'MAESTRA', receptor: 'Zapia-Alpha', mensaje: v, status: 'pending' }]);
            if(!error) i.value = '';
            btn.disabled = false;
        }
        init();
    </script>
</body>
</html>
