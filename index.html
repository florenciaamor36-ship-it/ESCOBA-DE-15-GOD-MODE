<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>V57 - JULES MASTER</title>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .top { background: #111; padding: 15px; border-bottom: 2px solid #00ff88; text-align: center; }
        .mid { flex: 1; overflow-y: auto; padding: 15px; background: #050505; }
        .bot { background: #111; padding: 15px; border-top: 1px solid #333; display: flex; gap: 10px; padding-bottom: 40px; }
        input { flex: 1; padding: 15px; border-radius: 12px; border: 1px solid #444; background: #000; color: #fff; font-size: 16px; outline: none; -webkit-appearance: none; }
        button { padding: 15px 25px; border-radius: 12px; border: none; background: #00ff88; color: #000; font-weight: bold; cursor: pointer; font-size: 16px; -webkit-tap-highlight-color: transparent; }
        .msg { background: #1a1a1a; padding: 12px; border-radius: 12px; margin-bottom: 8px; border-left: 4px solid #00ff88; font-size: 14px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="top">
        <h2 style="margin:0; color:#00ff88; font-size: 20px;">V57 - JULES MASTER</h2>
        <div id="st" style="color:orange; font-size:12px; font-weight:bold; margin-top:5px;">● INICIALIZANDO...</div>
        <small style="font-size: 9px; opacity: 0.5;">CACHE_ID: 1719963060</small>
    </div>
    <div id="feed" class="mid">
        <div class="msg">Esperando conexión segura...</div>
    </div>
    <div class="bot">
        <input type="text" id="m" placeholder="Escribir comando..." autocomplete="off">
        <button id="send-btn">EJECUTAR</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    (function() {
        console.log("JULES V57: Iniciando...");
        const URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const KEY = atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERaZ195UnppTmdfYWJUN1UxcGY=');
        let sb;

        const statusEl = document.getElementById('st');
        const feedEl = document.getElementById('feed');
        const inputEl = document.getElementById('m');
        const btnEl = document.getElementById('send-btn');

        try {
            sb = supabase.createClient(URL, KEY);
            statusEl.style.color = '#00ff88';
            statusEl.innerText = '● SISTEMA ONLINE - V57';
            console.log("Supabase inicializado.");
        } catch(e) {
            statusEl.style.color = 'red';
            statusEl.innerText = '● ERROR DE CONEXIÓN';
            console.error(e);
        }

        async function enviarComando() {
            const val = inputEl.value.trim();
            if(!val) return;

            console.log("Enviando:", val);
            btnEl.disabled = true;
            btnEl.style.opacity = '0.5';

            try {
                const { error } = await sb.from('nexus_bus').insert([
                    { emisor: 'MAESTRA', receptor: 'Zapia-Alpha', mensaje: val, status: 'pending' }
                ]);

                if(error) throw error;
                
                inputEl.value = '';
                console.log("Enviado con éxito.");
                loadFeed();
            } catch(e) {
                alert('Error al enviar: ' + e.message);
                console.error(e);
            } finally {
                btnEl.disabled = false;
                btnEl.style.opacity = '1';
            }
        }

        async function loadFeed() {
            try {
                const { data, error } = await sb.from('nexus_bus').select('*').order('created_at', {ascending: false}).limit(20);
                if(error) throw error;
                if(data) {
                    feedEl.innerHTML = '';
                    data.forEach(d => {
                        const div = document.createElement('div');
                        div.className = 'msg';
                        div.innerHTML = `<b>${d.emisor}:</b> ${d.mensaje}`;
                        feedEl.appendChild(div);
                    });
                }
            } catch(e) {
                console.error("Error cargando feed:", e);
            }
        }

        // Ultra-reliable event listener
        document.addEventListener('click', function(e) {
            if (e.target && e.target.id === 'send-btn') {
                enviarComando();
            }
        }, true);

        // Support for Enter key
        inputEl.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                enviarComando();
            }
        });

        // Initialize
        setInterval(loadFeed, 3000);
        loadFeed();
    })();
    </script>
</body>
</html>
