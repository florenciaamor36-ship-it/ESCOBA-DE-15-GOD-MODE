<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zapía IA - Base de Operaciones V50</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-green { background-color: #10b981; box-shadow: 0 0 15px #10b981; }
        .status-blue { background-color: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
        .pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .5; transform: scale(1.1); } }
        body { background: radial-gradient(circle at center, #020617 0%, #000000 100%); }
    </style>
</head>
<body class="text-white min-h-screen p-4 md:p-8">
    <header class="mb-8 flex justify-between items-center bg-slate-900/80 backdrop-blur-md p-6 rounded-3xl border border-slate-800 shadow-2xl">
        <div>
            <h1 class="text-2xl font-black text-blue-500 uppercase tracking-tighter">Zapía Nexus <span class="text-[10px] bg-blue-600 text-white px-2 py-0.5 rounded-full ml-2">V50.0</span></h1>
            <div class="flex items-center gap-2 mt-2">
                <div id="db-indicator" class="w-3 h-3 rounded-full bg-red-500 pulse"></div>
                <span id="db-text" class="text-xs text-slate-400 uppercase font-bold tracking-widest">Iniciando Enlace...</span>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest mb-1">Estado de Red</div>
            <div id="network-status" class="text-sm font-black text-red-500">OFFLINE</div>
        </div>
    </header>

    <main id="main-view">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="agents-grid">
            <!-- CARGANDO... -->
            <div class="col-span-full py-32 text-center bg-slate-900/20 border-4 border-dashed border-slate-900 rounded-[40px]">
                <div class="inline-block w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-6"></div>
                <h2 class="text-slate-600 font-black uppercase text-xl tracking-tighter">Sincronizando con Satélite Nexus...</h2>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const SB_PUB = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        
        let sb = null;

        function renderAgent(agent) {
            const grid = document.getElementById('agents-grid');
            let card = document.getElementById(`agent-${agent.id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `agent-${agent.id}`;
                card.className = 'bg-slate-900/60 backdrop-blur-sm rounded-[32px] p-8 border border-slate-800/50 shadow-2xl transition-all hover:scale-[1.02] hover:border-blue-500/30';
                grid.appendChild(card);
            }

            const isOnline = agent.status === 'online' || agent.status === 'green' || agent.status === 'live';
            const statusColor = isOnline ? 'status-green' : 'status-blue';
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-8">
                    <div>
                        <div class="text-[10px] text-blue-500 font-black uppercase tracking-widest mb-1">${agent.role || 'Agente Autónomo'}</div>
                        <h3 class="text-2xl font-black text-white leading-none">${agent.name || agent.emisor || 'Zapia Unit'}</h3>
                        <p class="text-[10px] text-slate-500 font-mono mt-2 opacity-50">${agent.id || agent.created_at}</p>
                    </div>
                    <div class="w-4 h-4 rounded-full ${statusColor} pulse"></div>
                </div>
                <div class="space-y-4">
                   <div class="bg-black/40 p-4 rounded-2xl border border-white/5">
                        <div class="text-[9px] text-slate-500 uppercase font-black mb-1 italic">Última Transmisión</div>
                        <div class="text-xs font-medium text-slate-200 line-clamp-2 italic">"${agent.mensaje || 'En espera de instrucciones...'}"</div>
                   </div>
                </div>
                <div class="mt-8 pt-6 border-t border-white/5 flex justify-between items-center">
                    <span class="text-[10px] font-black uppercase text-slate-500">Señal</span>
                    <span class="text-[10px] font-black uppercase text-green-500 tracking-widest">Encriptada</span>
                </div>
            `;
        }

        async function connect() {
            try {
                console.log("Intentando conectar a Supabase...");
                sb = supabase.createClient(SB_URL, SB_PUB);
                
                // Forzar un ping a la tabla nexus_bus
                const { data, error } = await sb.from('nexus_bus').select('*').order('created_at', { ascending: false }).limit(6);
                
                if (error) throw error;

                document.getElementById('db-indicator').className = 'w-3 h-3 rounded-full bg-green-500 pulse';
                document.getElementById('db-text').innerText = 'Enlace de Datos Establecido';
                document.getElementById('network-status').innerText = 'ONLINE';
                document.getElementById('network-status').className = 'text-sm font-black text-green-500';

                const grid = document.getElementById('agents-grid');
                grid.innerHTML = ''; // Limpiar cargando

                if (data && data.length > 0) {
                    data.forEach(renderAgent);
                } else {
                    grid.innerHTML = '<div class="col-span-full p-12 text-center text-slate-500 font-bold uppercase italic">No hay transmisiones recientes en el bus.</div>';
                }

                // Suscribirse a cambios en vivo
                sb.channel('nexus_bus')
                  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'nexus_bus' }, payload => {
                      console.log("Nueva transmisión recibida:", payload.new);
                      renderAgent(payload.new);
                  })
                  .subscribe();

            } catch (err) {
                console.error("Error de conexión:", err);
                document.getElementById('db-text').innerText = 'Fallo de Enlace Satelital';
                document.getElementById('network-status').innerText = 'ERROR';
                const grid = document.getElementById('agents-grid');
                grid.innerHTML = '<div class="col-span-full p-12 text-center text-red-500 font-black uppercase">Fallo crítico al conectar con Supabase. Verifique conexión.</div>';
            }
        }

        // Iniciar
        setTimeout(connect, 500);
    </script>
</body>
</html>
