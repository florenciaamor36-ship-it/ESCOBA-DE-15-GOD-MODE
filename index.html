<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NEXUS FINAL V58</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; height: 100%; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 60px; background: #111; border-bottom: 2px solid #0066ff; display: flex; align-items: center; padding: 0 20px; flex-shrink: 0; }
        .feed { flex: 1; overflow-y: auto; padding: 15px; background: #050505; display: flex; flex-direction: column-reverse; gap: 8px; }
        .footer { height: 100px; background: #111; border-top: 1px solid #333; padding: 15px; display: flex; gap: 10px; align-items: center; padding-bottom: 30px; flex-shrink: 0; }
        .msg { background: #1a1a1a; padding: 12px; border-radius: 12px; border: 1px solid #222; font-size: 14px; line-height: 1.4; }
        .msg b { color: #0066ff; font-size: 10px; text-transform: uppercase; display: block; margin-bottom: 4px; }
        input { flex: 1; height: 55px; background: #000; border: 2px solid #444; border-radius: 12px; color: #fff; padding: 0 15px; font-size: 16px; outline: none; }
        #btn-send { height: 55px; padding: 0 25px; background: #0066ff; border: none; border-radius: 12px; color: #fff; font-weight: 900; font-size: 14px; text-transform: uppercase; cursor: pointer; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: red; margin-right: 8px; }
        .online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header">
            <div id="dot" class="status-dot"></div>
            <div style="font-weight: 900; font-size: 16px; color: #0066ff;">NEXUS V58 <span style="color:#444; font-size:9px;">1783035535</span></div>
        </div>
        <div id="feed" class="feed"><div class="msg">Cargando base de datos...</div></div>
        <div class="footer">
            <input type="text" id="m-in" placeholder="Escribí aquí..." autocomplete="off">
            <button id="btn-send">ENVIAR</button>
        </div>
    </div>
    <script>
        const U = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const K = atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERnX3lSemlOZ19hYlQ3VTFwZg==');
        const sb = supabase.createClient(U, K);
        const f = document.getElementById('feed');
        const i = document.getElementById('m-in');
        const b = document.getElementById('btn-send');
        const d = document.getElementById('dot');
        function render(msg) {
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = '<b>' + msg.emisor + '</b> ' + msg.mensaje;
            f.prepend(div);
        }
        async function load() {
            const { data, error } = await sb.from('nexus_bus').select('*').order('created_at', { ascending: false }).limit(15);
            if (!error && data) {
                f.innerHTML = '';
                data.forEach(render);
                d.className = 'status-dot online';
            }
        }
        async function send() {
            const v = i.value.trim();
            if (!v) return;
            b.disabled = true;
            b.style.background = '#333';
            const { error } = await sb.from('nexus_bus').insert([{ emisor: 'MAESTRA', receptor: 'Zapia-Alpha', mensaje: v, status: 'pending' }]);
            if (!error) { i.value = ''; load(); }
            b.disabled = false;
            b.style.background = '#0066ff';
        }
        b.onclick = send;
        i.onkeydown = (e) => { if(e.key === 'Enter') send(); };
        setInterval(load, 3000);
        load();
    </script>
</body>
</html>
