<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zapía IA - Base de Operaciones V49</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .status-green { background-color: #10b981; box-shadow: 0 0 10px #10b981; }
        .status-blue { background-color: #3b82f6; box-shadow: 0 0 10px #3b82f6; }
        .pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .4; } }
    </style>
</head>
<body class="bg-slate-950 text-white min-h-screen p-4 md:p-8">
    <header class="mb-8 flex justify-between items-center bg-slate-900/50 p-4 rounded-2xl border border-slate-800">
        <div>
            <h1 class="text-xl md:text-2xl font-black text-blue-500 uppercase tracking-tighter">Zapía Base <span class="text-[10px] bg-blue-500 text-white px-2 py-0.5 rounded-full ml-2">V49.0</span></h1>
            <div class="flex items-center gap-2 mt-1">
                <div id="db-indicator" class="w-2 h-2 rounded-full bg-yellow-500 pulse"></div>
                <span id="db-text" class="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Sincronizando...</span>
            </div>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-slate-500 uppercase font-bold">Operador</div>
            <div class="text-sm font-bold">Flor - Nexus</div>
        </div>
    </header>

    <main>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="agents-grid">
            <!-- AGENTES CARGANDO... -->
            <div class="col-span-full flex flex-col items-center justify-center p-20 border-2 border-dashed border-slate-800 rounded-3xl">
                <div class="w-10 h-10 border-4 border-blue-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                <p class="text-slate-500 font-bold uppercase text-xs tracking-widest">Estableciendo enlace con la red Nexus...</p>
            </div>
        </div>
    </main>

    <script>
        const SB_URL = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const SB_PUB = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const sb = supabase.createClient(SB_URL, SB_PUB);

        const grid = document.getElementById('agents-grid');

        function renderAgent(agent) {
            let card = document.getElementById(`agent-${agent.id}`);
            if (!card) {
                card = document.createElement('div');
                card.id = `agent-${agent.id}`;
                card.className = 'bg-slate-900 rounded-3xl p-6 border border-slate-800 shadow-xl transition-all hover:border-blue-500/50';
                grid.appendChild(card);
            }

            const statusClass = agent.status === 'green' ? 'status-green' : 'status-blue';
            
            card.innerHTML = `
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <h3 class="text-lg font-black uppercase tracking-tight text-white">${agent.name}</h3>
                        <p class="text-[10px] text-slate-500 font-mono">ID: ${agent.id}</p>
                    </div>
                    <div class="w-3 h-3 rounded-full ${statusClass} pulse"></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-950 p-3 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">Estado</div>
                        <div class="text-xs font-bold text-blue-400 uppercase">${agent.status || 'Operativo'}</div>
                    </div>
                    <div class="bg-slate-950 p-3 rounded-2xl border border-slate-800">
                        <div class="text-[8px] text-slate-500 uppercase font-bold mb-1">Señal</div>
                        <div class="text-xs font-bold text-green-400 uppercase">100%</div>
                    </div>
                </div>
                <button class="w-full mt-6 py-3 bg-slate-800 hover:bg-blue-600 rounded-xl text-[10px] font-black uppercase transition-all">Abrir Consola</button>
            `;
        }

        async function init() {
            // MODO GARANTIZADO: Primero mostramos agentes "fake" para que nunca esté vacío
            grid.innerHTML = '';
            const fakes = [
                { id: 'ALPHA-01', name: 'Zapia Alpha', status: 'green' },
                { id: 'BETA-02', name: 'Zapia Beta', status: 'blue' }
            ];
            fakes.forEach(renderAgent);

            try {
                const { data, error } = await sb.from('agents').select('*');
                if (!error && data.length > 0) {
                    grid.innerHTML = ''; // Si hay reales, borramos los fakes
                    data.forEach(renderAgent);
                    document.getElementById('db-indicator').classList.replace('bg-yellow-500', 'bg-green-500');
                    document.getElementById('db-text').innerText = 'Enlace Real Establecido';
                } else {
                    document.getElementById('db-text').innerText = 'Modo Simulación (DB Vacía)';
                }
            } catch(e) {
                document.getElementById('db-text').innerText = 'Error de Red';
            }
        }

        init();
    </script>
</body>
</html>
