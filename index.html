<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZAPIA V54</title>
    <style>
        body { background: black; color: white; font-family: sans-serif; margin: 0; padding: 0; }
        .header { background: #111; padding: 20px; border-bottom: 2px solid #333; text-align: center; }
        .feed { padding: 20px; height: 60vh; overflow-y: auto; background: #050505; border-bottom: 2px solid #333; }
        .footer { padding: 20px; background: #111; }
        input { width: 70%; padding: 15px; border-radius: 10px; border: 1px solid #555; background: #000; color: white; }
        button { width: 25%; padding: 15px; border-radius: 10px; border: none; background: #0066ff; color: white; font-weight: bold; }
        .msg { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 5px solid #0066ff; }
    </style>
</head>
<body>
    <div class="header">
        <h2 style="margin:0; color:#0066ff;">ZAPIA NEXUS V54</h2>
        <div id="st" style="color:red; font-size:12px;">● DESCONECTADO</div>
    </div>

    <div id="feed" class="feed">
        <div class="msg"><b>SISTEMA:</b> Esperando conexión...</div>
    </div>

    <div class="footer">
        <input type="text" id="m" placeholder="Escribe aquí...">
        <button onclick="s()">ENVIAR</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const u = 'https://ypzudkxowpxvdggvongz.supabase.co';
        const p = 'sb_publishable_KmyqfJTmmW4R5FKUeB5b4A_GVFYnn4b';
        const k = atob('c2Jfc2VjcmV0X1pJNThaVlZwbklGZERnX3lSemlOZ19hYlQ3VTFwZg==');
        
        let client;
        try {
            client = supabase.createClient(u, k);
            document.getElementById('st').style.color = 'lime';
            document.getElementById('st').innerText = '● CONECTADO';
        } catch(e) { alert('Error carga: ' + e); }

        async function s() {
            const i = document.getElementById('m');
            const v = i.value.trim();
            if(!v) return;
            const { error } = await client.from('nexus_bus').insert([{ emisor:'MAESTRA', receptor:'Zapia-Alpha', mensaje:v, status:'pending' }]);
            if(!error) { i.value = ''; alert('OK'); } else { alert('Error: ' + error.message); }
        }

        async function load() {
            const { data } = await client.from('nexus_bus').select('*').order('created_at', {ascending:false}).limit(10);
            if(data) {
                const f = document.getElementById('feed');
                f.innerHTML = '';
                data.forEach(d => {
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.innerHTML = '<b>'+d.emisor+':</b> '+d.mensaje;
                    f.appendChild(div);
                });
            }
        }
        setInterval(load, 3000);
        load();
    </script>
</body>
</html>
